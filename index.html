<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/ionicons@5.4.0/dist/ionicons.js"></script>
</head>
<body>

    <div class="main">

        <!-- NAVBAR -->
        <div class="navbar">
            <h2 class="logo">A15 Tech</h2>

            <ul class="menu">
                <li><a href="#">HOME</a></li>
                <li><a href="#">ABOUT</a></li>
                <li><a href="#">WORLD</a></li>
                <li><a href="#">JOURNEY</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>

            <div class="search">
                <input type="text" placeholder="Type to text">
                <button>Search</button>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <div class="left">
                <h1>Web Design & <br><span>Development</span> <br>Course</h1>

                <p>
                    Learn modern web development with clean design principles,
                    responsive layouts and real-world projects.
                </p>

                <button class="join">JOIN US</button>
            </div>

            <!-- LOGIN FORM -->
            <div class="form">
                <h2>Login Here</h2>

                <input type="email" placeholder="Enter Email Here">
                <input type="password" placeholder="Enter Password Here">

                <button class="login-btn">Login</button>

                <p class="signup-text">
                    Don't have an account?
                    <a href="#">Sign up here</a>
                </p>

                <p class="social-text">Log in with</p>

                <div class="icons">
                    <a href="#"><ion-icon name="logo-facebook"></ion-icon></a>
                    <a href="#"><ion-icon name="logo-instagram"></ion-icon></a>
                    <a href="#"><ion-icon name="logo-twitter"></ion-icon></a>
                    <a href="#"><ion-icon name="logo-github"></ion-icon></a>
                    <a href="#"><ion-icon name="logo-linkedin"></ion-icon></a>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
